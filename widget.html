<!DOCTYPE html>
<html>
<head>
</head>
<body>
    <div id="app" style="padding:20px;font-family:Arial;">Loading...</div>
    <script src="./ZohoEmbededAppSDK.min.js"></script>
    <script>
    ZOHO.embeddedApp.on("PageLoad", function(data) {

        var recId = data.EntityId[0];

        // Show raw debug info so we can see what fields come back
        ZOHO.CRM.API.getRecord({ Entity: "Accounts", RecordID: recId }).then(function(recordData) {
            var rec = recordData.data[0];

            var debugHtml = '<div style="font-family:Arial,sans-serif;padding:16px;font-size:12px;">';
            debugHtml += '<div style="font-weight:bold;margin-bottom:8px;">DEBUG - Record Fields:</div>';
            debugHtml += '<div>RecordID: ' + recId + '</div>';
            debugHtml += '<div>Account_Name: ' + (rec.Account_Name || "(empty)") + '</div>';
            debugHtml += '<div>Calder_Type: ' + (rec.Calder_Type || "(empty)") + '</div>';
            debugHtml += '<div style="margin-top:10px;font-weight:bold;">All keys returned:</div>';

            var keys = Object.keys(rec);
            for(var i = 0; i < keys.length; i++) {
                var val = rec[keys[i]];
                if(val !== null && val !== "" && typeof val !== "object") {
                    debugHtml += '<div>' + keys[i] + ': ' + val + '</div>';
                }
            }
            debugHtml += '</div>';
            document.getElementById("app").innerHTML = debugHtml;

        }).catch(function(err) {
            document.getElementById("app").innerHTML = '<div style="padding:16px;color:red;">getRecord error: ' + JSON.stringify(err) + '</div>';
        });

    });

    ZOHO.embeddedApp.init();
    </script>
</body>
</html>
