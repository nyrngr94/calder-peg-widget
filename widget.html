<!DOCTYPE html>
<html>
<head>
</head>
<body>
    <div id="app" style="padding:20px;font-family:Arial;">Loading...</div>
    <script src="./ZohoEmbededAppSDK.min.js"></script>
    <script>
    ZOHO.embeddedApp.on("PageLoad", function(data) {

        var recId       = data.EntityId[0];
        var accountName = (data.EntityData && data.EntityData.Account_Name) ? data.EntityData.Account_Name : "This Account";
        var calderType  = (data.EntityData && data.EntityData.Calder_Type)  ? data.EntityData.Calder_Type  : "";
        var validTypes  = ["PEG", "PEG (Search)"];

        if(validTypes.indexOf(calderType) === -1) {
            document.getElementById("app").innerHTML =
                '<div style="font-family:Arial,sans-serif;padding:24px;text-align:center;">' +
                '<div style="font-size:15px;color:#c62828;margin-bottom:8px;">Not a PEG Account</div>' +
                '<div style="font-size:13px;color:#888;margin-bottom:16px;">Calder Type is <strong>' + calderType + '</strong>.<br>This tool only runs on PEG and PEG (Search) accounts.</div>' +
                '<button onclick="ZOHO.CRM.UI.Popup.close()" style="padding:8px 20px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;">Close</button>' +
                '</div>';
            return;
        }

        document.getElementById("app").innerHTML =
            '<div style="font-family:Arial,sans-serif;padding:24px;min-width:380px;">' +
            '<div style="font-size:17px;font-weight:bold;color:#222;margin-bottom:6px;">PEG Classifier</div>' +
            '<div style="font-size:13px;color:#888;margin-bottom:16px;">AI-powered investment profile analysis via Claude</div>' +
            '<div style="background:#f5f7ff;border:1px solid #d0d9f0;border-radius:6px;padding:12px 14px;margin-bottom:16px;">' +
            '<div style="font-size:14px;font-weight:bold;color:#222;">' + accountName + '</div>' +
            '<div style="font-size:12px;color:#666;margin-top:2px;">Calder Type: ' + calderType + '</div>' +
            '</div>' +
            '<div style="background:#fffbeb;border:1px solid #f6e05e;border-radius:6px;padding:10px 14px;font-size:12px;color:#744210;margin-bottom:20px;">' +
            'Warning: This will overwrite existing values in Sponsored, Buyouts, Recaps, Mezzanine Lender, Minority Investment, Assets, Industry Focus, Regions Focus, Add-On Min, Platform Min, and Areas of Interest.' +
            '</div>' +
            '<div style="display:flex;gap:10px;justify-content:flex-end;">' +
            '<button onclick="ZOHO.CRM.UI.Popup.close()" style="padding:9px 20px;border:1px solid #ccc;border-radius:4px;background:#fff;color:#444;font-size:14px;cursor:pointer;">Cancel</button>' +
            '<button onclick="runClassification()" style="padding:9px 20px;border:none;border-radius:4px;background:#0066cc;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;">Run Classification</button>' +
            '</div></div>';

        window.runClassification = function() {
            document.getElementById("app").innerHTML =
                '<div style="font-family:Arial,sans-serif;padding:24px;text-align:center;min-width:360px;">' +
                '<div style="font-size:16px;color:#444;margin-bottom:8px;">Analyzing...</div>' +
                '<div style="font-size:13px;color:#888;margin-bottom:20px;">Scraping website and calling Claude AI.<br>This may take 30-60 seconds.</div>' +
                '<div style="width:32px;height:32px;margin:0 auto;border:3px solid #e0e0e0;border-top:3px solid #0066cc;border-radius:50%;animation:spin 0.8s linear infinite;"></div>' +
                '</div>' +
                '<style>@keyframes spin{to{transform:rotate(360deg);}}</style>';

            ZOHO.CRM.FUNCTIONS.execute("peg_classify_account", {
                arguments: JSON.stringify({ accountId: recId.toString() })
            }).then(function(response) {

                var result;
                try {
                    var raw = response.details.output;
                    result = JSON.parse(raw);
                } catch(e) {
                    showError("Could not parse result: " + JSON.stringify(response));
                    return;
                }

                if(!result || result.status === "error") {
                    showError(result && result.message ? result.message : "Classification failed.");
                    return;
                }

                if(result.status === "skipped") {
                    showError("Skipped: " + (result.message || "No website found."));
                    return;
                }

                document.getElementById("app").innerHTML =
                    '<div style="font-family:Arial,sans-serif;padding:24px;text-align:center;min-width:360px;">' +
                    '<div style="font-size:32px;color:#2e7d32;">&#10003;</div>' +
                    '<div style="font-size:15px;font-weight:bold;color:#222;margin-top:8px;">Classification Complete</div>' +
                    '<div style="font-size:13px;color:#888;margin-top:6px;">' + accountName + ' has been updated.</div>' +
                    '<div style="font-size:12px;color:#555;margin-top:10px;">Reload the record to see all updated fields.</div>' +
                    '<div style="margin-top:20px;">' +
                    '<button onclick="ZOHO.CRM.UI.Popup.close()" style="padding:9px 20px;border:none;border-radius:4px;background:#0066cc;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;">Close</button>' +
                    '</div></div>';

            }).catch(function(err) {
                showError("Function call failed: " + JSON.stringify(err));
            });
        };

        function showError(msg) {
            document.getElementById("app").innerHTML =
                '<div style="font-family:Arial,sans-serif;padding:24px;text-align:center;">' +
                '<div style="font-size:15px;color:#c62828;margin-bottom:8px;">Error</div>' +
                '<div style="font-size:13px;color:#555;margin-bottom:16px;">' + msg + '</div>' +
                '<button onclick="ZOHO.CRM.UI.Popup.close()" style="padding:8px 20px;border:1px solid #ccc;border-radius:4px;background:#fff;cursor:pointer;">Close</button>' +
                '</div>';
        }

    });

    ZOHO.embeddedApp.init();
    </script>
</body>
</html>
